<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profanity Filter</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Main View -->
  <div id="mainView">
    <div class="header">
      <h1>Profanity Filter</h1>
      <span class="icon">🔇</span>
    </div>

    <div class="status-section">
      <div class="status-indicator status-inactive" id="statusIndicator"></div>
      <div class="status-text" id="statusText">Checking...</div>
    </div>

    <div class="stats-section hidden" id="statsSection">
      <div class="stat-item">
        <span class="stat-label">Total Cues</span>
        <span class="stat-value" id="totalCues">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">With Profanity</span>
        <span class="stat-value profanity-count" id="profanityCount">0</span>
      </div>
    </div>

    <div class="track-section hidden" id="trackSection">
      <div class="track-label">Current Track</div>
      <div class="track-current" id="currentTrack">
        <span id="currentTrackName">None selected</span>
        <button id="changeTrackBtn" class="secondary small">Change</button>
        <button id="unloadBtn" class="secondary small" style="display: none;">Unload</button>
      </div>
      <div class="track-list hidden" id="trackList">
        <div id="trackOptions"></div>
        <div class="track-upload">
          <button id="uploadBtn" class="secondary small">Upload subtitle file...</button>
        </div>
      </div>
    </div>

    <div class="current-cue hidden" id="currentCue">
      <div class="current-cue-label">Current Cue</div>
      <div class="current-cue-text" id="cueText"></div>
    </div>

    <div class="next-cues" id="nextCues">
      <div class="next-cues-label">Upcoming</div>
      <div id="nextList"></div>
    </div>

    <div class="button-group">
      <button id="toggle" class="primary" disabled>Enable</button>
      <button id="options" class="secondary">Settings</button>
    </div>

    <div class="footer">
      <a href="#" id="openFullOptions">Full Options</a>
    </div>
  </div>

  <!-- Settings View -->
  <div id="settingsView" class="hidden">
    <div class="header">
      <button id="backBtn" class="back-btn">← Back</button>
      <h1>Settings</h1>
    </div>

    <div class="settings-content">
      <!-- Quick Offset -->
      <div class="settings-section">
        <div class="settings-label">Timing Offset</div>
        <div class="offset-slider">
          <input type="range" id="offsetSlider" min="-10000" max="10000" step="100" value="0">
          <span class="offset-value" id="offsetValue">0ms</span>
        </div>
        <div class="offset-buttons">
          <button id="offsetBack" class="secondary small">◀ -500ms</button>
          <button id="offsetForward" class="secondary small">+500ms ▶</button>
        </div>
      </div>

      <!-- Sensitivity -->
      <div class="settings-section">
        <div class="settings-label">Sensitivity</div>
        <select id="sensitivity">
          <option value="low">Low - Only obvious profanity</option>
          <option value="medium" selected>Medium - Standard</option>
          <option value="high">High - Aggressive</option>
        </select>
      </div>

      <!-- Display Options -->
      <div class="settings-section">
        <div class="settings-label">Display</div>
        <label class="checkbox-label">
          <input type="checkbox" id="showUpcomingCues">
          <span>Show upcoming cues</span>
        </label>
        <label class="checkbox-label">
          <input type="checkbox" id="showProfanityOnly">
          <span>Only show profanity cues</span>
        </label>
      </div>

      <!-- Fun Substitutions -->
      <div class="settings-section">
        <div class="settings-label">Fun Substitutions</div>
        <label class="checkbox-label">
          <input type="checkbox" id="useSubstitutions">
          <span>Replace profanity with fun alternatives</span>
        </label>
        <select id="substitutionCategory" class="hidden">
          <option value="silly">Silly (fudge, frick)</option>
          <option value="polite">Polite (darn, bother)</option>
          <option value="random">Random (bananas, noodles)</option>
          <option value="monkeys">Monkeys (🙈🙉🙊)</option>
        </select>
      </div>

      <!-- Font Size -->
      <div class="settings-section">
        <div class="settings-label">Subtitle Size</div>
        <select id="fontSize">
          <option value="small">Small (16px)</option>
          <option value="medium" selected>Medium (20px)</option>
          <option value="large">Large (26px)</option>
          <option value="xlarge">Extra Large (32px)</option>
        </select>
      </div>

      <!-- Text Color -->
      <div class="settings-section">
        <div class="settings-label">Text Color</div>
        <div class="color-row">
          <input type="color" id="fontColor" value="#ffffff">
          <input type="text" id="fontColorText" value="#ffffff" maxlength="7" class="color-text">
        </div>
      </div>

      <!-- Background Color -->
      <div class="settings-section">
        <div class="settings-label">Background Color</div>
        <div class="color-row">
          <input type="color" id="backgroundColor" value="#000000">
          <input type="text" id="backgroundColorText" value="#000000" maxlength="7" class="color-text">
        </div>
      </div>

      <!-- Background Opacity -->
      <div class="settings-section">
        <div class="settings-label">Background Opacity</div>
        <div class="opacity-slider">
          <input type="range" id="backgroundOpacity" min="0" max="100" step="5" value="80">
          <span class="opacity-value" id="opacityValue">80%</span>
        </div>
      </div>

      <!-- Position -->
      <div class="settings-section">
        <div class="settings-label">Position</div>
        <select id="position">
          <option value="bottom" selected>Bottom</option>
          <option value="middle">Middle</option>
          <option value="top">Top</option>
        </select>
      </div>
    </div>

    <div class="button-group">
      <button id="saveSettings" class="primary">Save Settings</button>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
